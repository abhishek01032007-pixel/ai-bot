<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;
  --sidebar-w:56px;--panel-w:280px;
  --border:#2a2a2a;--accent:#00c8ff;--accent2:#0066ff;--accent3:#00ffcc;
  --text:#ececec;--text-dim:#666;
  --user-bg:#1a2a1a;--bot-bg:#111;
  --glow:rgba(0,200,255,0.15);
}
@keyframes borderSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-8px);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,200,255,.4)}50%{box-shadow:0 0 0 6px rgba(0,200,255,0)}}
@keyframes panelSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;overflow:hidden;}

/* ICON SIDEBAR */
.icon-bar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:#0d0d0d;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;z-index:20;}
.icon-bar .bot-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px;box-shadow:0 0 14px var(--glow);}
.icon-btn{width:38px;height:38px;border-radius:10px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn svg{fill:#555;transition:fill .2s;}
.icon-btn:hover{background:#1a1a1a;}
.icon-btn:hover svg{fill:var(--accent);}
.icon-btn.active{background:#1a1a1a;}
.icon-btn.active svg{fill:var(--accent);}
.icon-bar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;cursor:pointer;}

/* HISTORY PANEL */
.history-panel{width:0;min-width:0;height:100vh;background:#111;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease,min-width .25s ease;z-index:15;}
.history-panel.open{width:var(--panel-w);min-width:var(--panel-w);animation:panelSlide .25s ease;}
.panel-header{padding:16px 14px 10px;flex-shrink:0;}
.panel-title{font-family:'Space Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.08em;}
.new-chat-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 28px);margin:0 14px 8px;padding:9px 12px;border-radius:10px;cursor:pointer;background:transparent;border:1px solid #2a2a2a;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;transition:all .2s;}
.new-chat-btn:hover{background:#1a1a1a;border-color:var(--accent);color:var(--accent);}
.new-chat-btn svg{fill:currentColor;flex-shrink:0;}
.section-label{font-size:10px;color:#444;font-family:'Space Mono',monospace;letter-spacing:.08em;padding:10px 14px 4px;}

/* Warning card */
.warn-card{margin:6px 10px 10px;background:#1a1200;border:1px solid #3a2800;border-radius:10px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}
.warn-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.warn-text{font-size:11.5px;color:#bb9944;line-height:1.6;}

.chat-list{flex:1;overflow-y:auto;padding:0 8px;}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.chat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;gap:6px;animation:slideIn .2s ease;}
.chat-item:hover{background:#1a1a1a;}
.chat-item.active{background:#1e1e1e;}
.chat-item-title{font-size:13px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-item:hover .chat-item-title,.chat-item.active .chat-item-title{color:var(--text);}
.chat-del{opacity:0;background:transparent;border:none;color:#555;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;transition:all .2s;}
.chat-item:hover .chat-del{opacity:1;}
.chat-del:hover{color:#ff5555;}
.panel-bottom{padding:12px 14px;border-top:1px solid #1a1a1a;flex-shrink:0;}
.online-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:#444;font-family:'Space Mono',monospace;}
.online-dot{width:5px;height:5px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;height:100dvh;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #141414;flex-shrink:0;}
.topbar-title{font-size:13px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;font-family:'Space Mono',monospace;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.model-badge{background:#141414;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;font-size:11px;color:#555;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;}
.model-badge:hover{border-color:var(--accent);color:var(--accent);}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:24px 20%;scroll-behavior:smooth;min-height:0;}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#222;border-radius:4px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:60px 20px;min-height:60vh;}
.welcome-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 40px var(--glow);animation:float 3s ease-in-out infinite;}
.welcome h2{font-size:22px;font-weight:700;color:var(--text);}
.welcome p{font-size:14px;color:var(--text-dim);line-height:1.8;max-width:400px;}
.example-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;max-width:500px;width:100%;}
.example-card{background:#141414;border:1px solid #222;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#666;cursor:pointer;transition:all .2s;text-align:left;}
.example-card:hover{border-color:var(--accent);color:var(--text);background:#1a1a1a;}
.example-card span{display:block;font-size:17px;margin-bottom:4px;}

/* Messages */
.message{display:flex;gap:14px;animation:fadeUp .25s ease;max-width:760px;margin:0 auto 4px;width:100%;}
.message.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.message.user .avatar{background:#1e3a1e;}
.message.bot .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.bubble-wrap{display:flex;flex-direction:column;gap:4px;max-width:calc(100% - 44px);}
.message.user .bubble-wrap{align-items:flex-end;}
.message.bot .bubble-wrap{align-items:flex-start;}
.bubble{padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.message.user .bubble{background:#1a2a1a;border:1px solid #2a3a2a;border-top-right-radius:3px;color:#a8e6a8;}
.message.bot .bubble{background:transparent;color:var(--text);border-top-left-radius:3px;padding-left:0;}
.msg-actions{display:flex;gap:4px;}
.action-btn{display:flex;align-items:center;gap:3px;background:transparent;border:1px solid #222;color:#555;font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;transition:all .2s;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.copied,.action-btn.speaking{border-color:var(--accent3);color:var(--accent3);}
.action-btn svg{width:10px;height:10px;fill:currentColor;}

/* Typing indicator */
.typing .bubble{display:flex;align-items:center;gap:5px;padding:11px 0;}
.dot{width:6px;height:6px;background:#444;border-radius:50%;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* Input */
.input-area{padding:12px 20%;padding-bottom:16px;flex-shrink:0;}
.input-outer{position:relative;border-radius:14px;}
.input-outer::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3),var(--accent));background-size:300% 300%;animation:borderSpin 4s ease infinite;z-index:0;opacity:.6;}
.input-wrap{position:relative;z-index:1;background:#111;border-radius:13px;padding:10px 10px 10px 14px;display:flex;align-items:flex-end;gap:8px;}
#user-input{flex:1;background:transparent;border:none;outline:none;font-family:'Manrope',sans-serif;font-size:14px;color:var(--text);resize:none;max-height:120px;min-height:24px;line-height:1.6;}
#user-input::placeholder{color:#333}
.mic-btn{width:34px;height:34px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.mic-btn:hover{border-color:var(--accent);}
.mic-btn svg{fill:#555;}
.mic-btn.listening{border-color:var(--accent3);animation:speakPulse 1s infinite;}
.mic-btn.listening svg{fill:var(--accent3);}
.send-btn{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.07);}
.send-btn:active{transform:scale(0.93);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.send-btn svg{fill:#000;}
.input-hint{text-align:center;font-size:10px;color:#2a2a2a;font-family:'Space Mono',monospace;margin-top:6px;}

/* Mobile */
@media(max-width:700px){
  .icon-bar{width:44px;min-width:44px;}
  .chat-area{padding:16px 5%;}
  .input-area{padding:10px 5% 14px;}
  .example-grid{grid-template-columns:1fr 1fr;}
  .topbar-title{display:none;}
  .welcome h2{font-size:18px;}
  .input-hint{display:none;}
}
</style>
</head>
<body>

<!-- ICON BAR -->
<div class="icon-bar">
  <div class="bot-icon">🤖</div>

  <button class="icon-btn active" id="hist-toggle" onclick="togglePanel()" title="Chat history">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
  </button>

  <button class="icon-btn" onclick="newChat()" title="New chat">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>

  <div class="icon-bar-bottom">
    <div class="user-avatar">A</div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="history-panel open" id="history-panel">
  <div class="panel-header">
    <span class="panel-title">AI BOT</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    New chat
  </button>

  <div class="section-label">RECENTS</div>

  <div class="warn-card">
    <div class="warn-icon">⚠️</div>
    <div class="warn-text">Don't delete your browsing data — you may lose your chat history :(</div>
  </div>

  <div class="chat-list" id="chat-list"></div>

  <div class="panel-bottom">
    <div class="online-badge"><div class="online-dot"></div>GROQ · LLAMA3</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="chat-title">New conversation</span>
    <div class="topbar-right">
      <div class="model-badge">🚀 LlamaNova ·70B</div>
    </div>
  </div>

  <div class="chat-area" id="chat-window"></div>

  <div class="input-area">
    <div class="input-outer">
      <div class="input-wrap">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea id="user-input" rows="1" placeholder="Ask me anything :)" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="input-hint">ENTER to send · SHIFT+ENTER for new line</div>
  </div>
</div>

<script>
  const DB_KEY = 'aibot_sessions';
  let sessions = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  let currentId = null;
  let currentSpeech = null;
  let recognition = null;
  let isListening = false;
  let panelOpen = true;

  function saveSessions(){ localStorage.setItem(DB_KEY, JSON.stringify(sessions)); }
  function getSession(id){ return sessions.find(s => s.id === id); }

  function togglePanel(){
    panelOpen = !panelOpen;
    document.getElementById('history-panel').classList.toggle('open', panelOpen);
    document.getElementById('hist-toggle').classList.toggle('active', panelOpen);
  }

  function closePanel(){
    panelOpen = false;
    document.getElementById('history-panel').classList.remove('open');
    document.getElementById('hist-toggle').classList.remove('active');
  }

  function renderSidebar(){
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    if(!sessions.length){
      list.innerHTML = '<div style="font-size:12px;color:#444;padding:8px 10px;font-style:italic;">No chats yet</div>';
      return;
    }
    [...sessions].reverse().forEach(s => {
      const d = document.createElement('div');
      d.className = 'chat-item' + (s.id === currentId ? ' active' : '');
      d.innerHTML = `<span class="chat-item-title">${s.title}</span><button class="chat-del" onclick="delSession(event,'${s.id}')">✕</button>`;
      d.onclick = (e) => { if(e.target.classList.contains('chat-del')) return; loadSession(s.id); };
      list.appendChild(d);
    });
  }

  function delSession(e, id){
    e.stopPropagation();
    sessions = sessions.filter(s => s.id !== id);
    saveSessions();
    if(currentId === id) newChat();
    else renderSidebar();
  }

  function newChat(){
    currentId = Date.now().toString();
    sessions.push({ id: currentId, title: 'New chat', messages: [] });
    saveSessions(); renderSidebar(); renderChat([]);
    document.getElementById('chat-title').textContent = 'New conversation';
    document.getElementById('user-input').focus();
    closePanel();
  }

  function loadSession(id){
    currentId = id;
    const s = getSession(id);
    renderSidebar(); renderChat(s.messages);
    document.getElementById('chat-title').textContent = s.title;
    closePanel();
  }

  function renderChat(msgs){
    const win = document.getElementById('chat-window');
    win.innerHTML = '';
    if(!msgs.length){
      win.innerHTML = `<div class="welcome" id="welcome">
        <div class="welcome-logo">🤖</div>
        <h2>Hey, I'm AI Bot!</h2>
        <p>Ask me anything — coding, science, math, writing, general knowledge.</p>
        <div class="example-grid">
          <div class="example-card" onclick="ask('Write a Python function to reverse a string')"><span>🐍</span>Write Python code</div>
          <div class="example-card" onclick="ask('Explain black holes in simple words')"><span>🌌</span>Explain black holes</div>
          <div class="example-card" onclick="ask('Give me 5 tips to learn faster')"><span>💡</span>Learning tips</div>
          <div class="example-card" onclick="ask('Tell me a fun fact about space')"><span>🚀</span>Fun space fact</div>
          <div class="example-card" onclick="ask('How does the internet work?')"><span>🌐</span>How internet works</div>
          <div class="example-card" onclick="ask('Write a short poem about AI')"><span>✍️</span>Write a poem</div>
        </div>
      </div>`;
    } else {
      msgs.forEach(m => appendMessage(m.role, m.text, false));
    }
  }

  function appendMessage(role, text, save=true){
    const w = document.getElementById('welcome'); if(w) w.remove();
    const win = document.getElementById('chat-window');
    const div = document.createElement('div'); div.className = `message ${role}`;
    const bw = document.createElement('div'); bw.className = 'bubble-wrap';
    const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
    bw.appendChild(b);
    if(role === 'bot'){
      const acts = document.createElement('div'); acts.className = 'msg-actions';
      const cb = document.createElement('button'); cb.className = 'action-btn';
      cb.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> COPY`;
      cb.onclick = () => copyText(cb, text);
      const sb = document.createElement('button'); sb.className = 'action-btn';
      sb.innerHTML = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> SPEAK`;
      sb.onclick = () => speak(sb, text);
      acts.appendChild(cb); acts.appendChild(sb); bw.appendChild(acts);
    }
    div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>`;
    div.appendChild(bw); win.appendChild(div);
    win.scrollTop = win.scrollHeight;
    if(save){
      const s = getSession(currentId);
      if(s){
        s.messages.push({ role, text });
        if(s.messages.length === 1 && role === 'user'){
          s.title = text.split(' ').slice(0, 5).join(' ') + (text.split(' ').length > 5 ? '…' : '');
        }
        saveSessions(); renderSidebar();
        document.getElementById('chat-title').textContent = s.title;
      }
    }
  }

  function showTyping(){
    const w = document.getElementById('welcome'); if(w) w.remove();
    const win = document.getElementById('chat-window');
    const d = document.createElement('div'); d.className = 'message bot typing'; d.id = 'typing';
    d.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    win.appendChild(d); win.scrollTop = win.scrollHeight;
  }
  function removeTyping(){ const e = document.getElementById('typing'); if(e) e.remove(); }

  async function sendMessage(){
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const msg = input.value.trim(); if(!msg) return;
    input.value = ''; input.style.height = 'auto'; btn.disabled = true;
    closePanel();
    appendMessage('user', msg); showTyping();
    try{
      const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ message: msg }) });
      const data = await res.json(); removeTyping();
      appendMessage('bot', data.reply || 'Something went wrong.');
    } catch {
      removeTyping();
      appendMessage('bot', 'Connection error. Is the server running?');
    }
    btn.disabled = false; input.focus();
  }

  function copyText(btn, text){
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> COPIED`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> COPY`;
      }, 2000);
    });
  }

  function speak(btn, text){
    if(currentSpeech && window.speechSynthesis.speaking){
      window.speechSynthesis.cancel(); currentSpeech = null;
      btn.classList.remove('speaking');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> SPEAK`;
      return;
    }
    const utt = new SpeechSynthesisUtterance(text); utt.rate = 0.95;
    utt.onend = () => {
      btn.classList.remove('speaking');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> SPEAK`;
      currentSpeech = null;
    };
    currentSpeech = utt; btn.classList.add('speaking');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> STOP`;
    window.speechSynthesis.speak(utt);
  }

  function toggleMic(){
    const mb = document.getElementById('mic-btn');
    const inp = document.getElementById('user-input');
    if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
      alert('Voice input works in Chrome only!'); return;
    }
    if(isListening){ recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR(); recognition.lang = 'en-US'; recognition.interimResults = true;
    recognition.onstart = () => { isListening = true; mb.classList.add('listening'); inp.placeholder = '🎤 Listening...'; };
    recognition.onresult = (e) => { inp.value = Array.from(e.results).map(r => r[0].transcript).join(''); autoResize(inp); };
    recognition.onend = () => { isListening = false; mb.classList.remove('listening'); inp.placeholder = 'Ask me anything :)'; if(inp.value.trim()) sendMessage(); };
    recognition.onerror = () => { isListening = false; mb.classList.remove('listening'); inp.placeholder = 'Ask me anything :)'; };
    recognition.start();
  }

  function autoResize(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
  function handleKey(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
  function ask(text){ document.getElementById('user-input').value = text; sendMessage(); }

  window.addEventListener('load', () => {
    if(sessions.length > 0) loadSession(sessions[sessions.length - 1].id);
    else newChat();
  });

  // Warn before closing/refreshing tab
  window.addEventListener('beforeunload', (e) => {
    e.preventDefault();
    e.returnValue = '';
  });
</script>
</body>
</html>
